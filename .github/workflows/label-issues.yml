name: Auto-label Issues by Type

on:
  issues:
    types: [ opened, edited ]

permissions:
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const body = context.payload.issue.body || '';
            const issueNumber = context.payload.issue.number;

            const match = body.match(/### Issue Type\s*\n+(.+?)(?:\n|$)/);
            if (!match) return;

            const typeValue = match[1].trim();
            const labelMap = {
              'Bug': 'bug',
              'Feature Request': 'enhancement',
              'Task': 'task',
              'Documentation': 'documentation',
            };

            const newLabel = labelMap[typeValue];
            if (!newLabel) return;

            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });

            const typeLabels = Object.values(labelMap);
            for (const label of currentLabels) {
              if (typeLabels.includes(label.name)) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  name: label.name,
                });
              }
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: [newLabel],
            });
